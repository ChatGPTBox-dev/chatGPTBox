name: Firefox metadata

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Firefox version to update, for example 2.6.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-firefox-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Update Firefox metadata
        run: |
          if [[ ! "$FIREFOX_METADATA_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Firefox version must use x.y.z semver format" >&2
            exit 1
          fi

          npm run release:update-firefox-metadata -- --version "$FIREFOX_METADATA_VERSION"
        env:
          FIREFOX_METADATA_VERSION: ${{ inputs.version }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
